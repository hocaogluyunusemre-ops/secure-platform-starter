# Bu workflow, her PR ve main push'unda kapsamlı güvenlik kontrolleri çalıştırır.
# Her adım ayrı job — birbirini blok etmez, paralel koşar (hızlı feedback).
# Detay: docs/security/02-phase-2-coding-rules.md "Otomatik Kontroller" bölümü

name: Security Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    # Pazar gece haftalık tam tarama
    - cron: '0 3 * * 0'

permissions:
  contents: read
  security-events: write   # SARIF upload için
  pull-requests: write      # PR yorumu için

jobs:
  # ============================================
  # 1. Lint + Type Check
  # ============================================
  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: ESLint (with security plugin)
        run: npm run lint
        # eslint-plugin-security yüklü olmalı; .eslintrc içinde "plugin:security/recommended"

      - name: TypeScript type check
        run: npx tsc --noEmit

  # ============================================
  # 2. Unit & Integration Tests
  # ============================================
  test:
    name: Tests + Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm test -- --coverage

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: coverage/

  # ============================================
  # 3. Dependency Vulnerability Scan
  # OWASP A03:2025 — Software Supply Chain Failures
  # ============================================
  npm-audit:
    name: npm audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: npm audit (high+ severity)
        run: npm audit --audit-level=high
        # Bu adım critical/high CVE varsa fail eder

      - name: npm audit JSON (full report)
        if: always()
        run: npm audit --json > npm-audit.json || true

      - name: Upload audit report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: npm-audit-report
          path: npm-audit.json

  # ============================================
  # 4. Secret Scanning
  # OWASP A02:2025 — Security Misconfiguration
  # ============================================
  secret-scan:
    name: Secret Scanning (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # Full history için gitleaks gerekir

      - name: gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }} # org pro ise

  # ============================================
  # 5. SAST (Static Application Security Testing)
  # OWASP A05:2025 (Injection), A06:2025 (Insecure Design)
  # ============================================
  semgrep:
    name: Semgrep SAST
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep
    steps:
      - uses: actions/checkout@v4

      - name: Run Semgrep
        run: |
          semgrep ci \
            --config=p/owasp-top-ten \
            --config=p/security-audit \
            --config=p/secrets \
            --config=p/typescript \
            --config=p/react \
            --sarif --output=semgrep.sarif || true

      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: semgrep.sarif
          category: semgrep

  # ============================================
  # 6. CodeQL (GitHub native SAST)
  # OWASP A05:2025
  # ============================================
  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
          queries: security-extended,security-and-quality

      - uses: github/codeql-action/analyze@v3

  # ============================================
  # 7. License Compliance
  # OWASP A03:2025 (Supply Chain — license risk)
  # ============================================
  license-check:
    name: License Compliance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci

      - name: Check licenses
        run: |
          npx license-checker --summary
          # Forbidden: GPL-3.0, AGPL-3.0 (eğer ürün kapalı kaynak ise)
          npx license-checker --excludePackages 'mypackage@1.0.0' \
            --failOn 'GPL-3.0;AGPL-3.0;AGPL-3.0-or-later;LGPL-3.0' || (echo "License violation!"; exit 1)

  # ============================================
  # 8. SBOM Generation (CycloneDX)
  # OWASP A03:2025 + Customer evidence pack için
  # ============================================
  sbom:
    name: SBOM Generation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci

      - name: Generate SBOM (CycloneDX)
        run: npx @cyclonedx/cyclonedx-npm --output-format JSON --output-file sbom.json

      - name: Upload SBOM
        uses: actions/upload-artifact@v7
        with:
          name: sbom
          path: sbom.json

      - name: Commit SBOM to evidence/ (only on main)
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          mkdir -p docs/security/evidence/
          cp sbom.json docs/security/evidence/16-sbom-current.json
          # Otomatik commit/push: bot user gerekiyorsa ayrı action ekle

  # ============================================
  # 9. IaC Security Scan (Terraform / CDK varsa)
  # OWASP A02:2025
  # ============================================
  iac-scan:
    name: IaC Security (Checkov)
    runs-on: ubuntu-latest
    if: hashFiles('infra/**', 'terraform/**', 'cdk/**') != ''
    steps:
      - uses: actions/checkout@v4

      - name: Checkov scan
        uses: bridgecrewio/checkov-action@master
        with:
          directory: .
          framework: terraform,cloudformation,kubernetes,dockerfile
          soft_fail: false
          output_format: sarif
          output_file_path: checkov.sarif

      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: checkov.sarif
          category: checkov

  # ============================================
  # 10. Container Scan (Dockerfile varsa)
  # OWASP A03:2025 (supply chain — base image)
  # ============================================
  container-scan:
    name: Container Scan (Trivy)
    runs-on: ubuntu-latest
    if: hashFiles('Dockerfile') != ''
    steps:
      - uses: actions/checkout@v4

      - name: Build container
        run: docker build -t app:scan .

      - name: Trivy scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'app:scan'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'HIGH,CRITICAL'

      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif
          category: trivy

  # ============================================
  # 11. Build (final sanity)
  # ============================================
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck, test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run build
        env:
          # Build için gerekli env'ler — production secret KESINLIKLE değil
          NODE_ENV: production

  # ============================================
  # 12. (Haftalık) DAST — OWASP ZAP Baseline
  # OWASP A01:2025, A05:2025
  # Sadece scheduled run'da
  # ============================================
  zap-baseline:
    name: OWASP ZAP Baseline (Weekly)
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    steps:
      - uses: actions/checkout@v4

      - name: ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.13.0
        with:
          target: 'https://staging.example.com'   # ← projeye göre güncelle
          rules_file_name: '.zap/rules.tsv'
          cmd_options: '-a'
          fail_action: false   # Baseline scan bilgilendirici, fail etme

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: zap-baseline-report
          path: report_html.html

  # ============================================
  # 13. Summary (Dashboard PR yorumu)
  # ============================================
  summary:
    name: Security Summary
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck, test, npm-audit, secret-scan, semgrep, codeql, license-check, sbom, build]
    if: always()
    steps:
      - name: Check all jobs
        run: |
          echo "Lint:      ${{ needs.lint-and-typecheck.result }}"
          echo "Tests:     ${{ needs.test.result }}"
          echo "Audit:     ${{ needs.npm-audit.result }}"
          echo "Secrets:   ${{ needs.secret-scan.result }}"
          echo "Semgrep:   ${{ needs.semgrep.result }}"
          echo "CodeQL:    ${{ needs.codeql.result }}"
          echo "License:   ${{ needs.license-check.result }}"
          echo "SBOM:      ${{ needs.sbom.result }}"
          echo "Build:     ${{ needs.build.result }}"

          # Critical job failure → workflow fail
          if [[ "${{ needs.lint-and-typecheck.result }}" != "success" ]] || \
             [[ "${{ needs.test.result }}" != "success" ]] || \
             [[ "${{ needs.npm-audit.result }}" != "success" ]] || \
             [[ "${{ needs.secret-scan.result }}" != "success" ]] || \
             [[ "${{ needs.build.result }}" != "success" ]]; then
            echo "::error::Critical security check failed"
            exit 1
          fi
